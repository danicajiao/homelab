# Smoke-test ExternalSecret for the Garage `images` bucket credentials.
#
# Pulls the access key ID and secret key created during bootstrap (see
# `docs/garage-install.md`, Steps 4–5) from GCP Secret Manager (project
# `cove-6a685`) and materializes them as a single K8s Secret named
# `garage-images-creds` in the `garage` namespace. The Secret exposes the keys
# under the standard AWS env-var names (`AWS_ACCESS_KEY_ID` /
# `AWS_SECRET_ACCESS_KEY`) so any S3 SDK can consume it via `envFrom`.
#
# This doubles as the Phase 0 smoke test for the GCP→ESO→K8s path for Garage
# credentials — the runbook's Step 7 launches a temporary `aws-cli` pod that
# sources this Secret to PUT/GET/DELETE against the `images` bucket.
#
# Expected state on first apply: `SecretSyncedError`. The four GCP secrets
# don't exist until the runbook bootstrap (Steps 1–5) completes. Once they
# do, force-sync this resource per Step 6 and it materializes.
#
# A matching ExternalSecret for `postgres-backups` is intentionally NOT
# included here — its consumer (the CNPG `Cluster` with backup config) doesn't
# exist until Phase 3, at which point the ExternalSecret will live in
# `cnpg-system` (or wherever the `Cluster` is declared) alongside the consumer.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: garage-images-creds
    namespace: garage
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-cove
    target:
        name: garage-images-creds
        creationPolicy: Owner
    data:
        - secretKey: AWS_ACCESS_KEY_ID
          remoteRef:
              key: garage-images-access-key
        - secretKey: AWS_SECRET_ACCESS_KEY
          remoteRef:
              key: garage-images-secret-key

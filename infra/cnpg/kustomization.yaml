apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CloudNativePG operator — repo-managed manifests.
#
# Phase 0 only owns the namespace here. The operator + CRDs are installed via
# the upstream Helm chart, which Argo CD pulls directly — see
# `argocd/cnpg.yaml` for the chart source and pinned version.
#
# Postgres `Cluster` resources for cove-product and cove-user land in Phase 3,
# at which point they'll be added alongside this namespace (or split into a
# separate Application if the chart-vs-CR layout gets noisy). For now the
# smoke test is "operator pod healthy + CRDs registered" — no smoke `Cluster`.
#
# Latest releases: https://github.com/cloudnative-pg/charts/releases

namespace: cnpg-system

resources:
    - namespace.yaml

# Loki Garage S3 credentials ExternalSecret.
#
# Pulls the access key ID and secret key for the Garage `loki` bucket (created
# during the runbook bootstrap — see `docs/loki-install.md` Steps 1-2) from
# GCP Secret Manager (project `homelab-495921`) via the `gcp-homelab`
# ClusterSecretStore, and materializes them as a single K8s Secret named
# `loki-creds` in the `monitoring` namespace.
#
# The Secret exposes the keys under the standard AWS env-var names
# (`AWS_ACCESS_KEY_ID` / `AWS_SECRET_ACCESS_KEY`) so Loki's S3 backend
# (which wraps the AWS SDK) picks them up automatically via envFrom — see
# the `singleBinary.extraEnvFrom` block in `argocd/loki.yaml`. No explicit
# `accessKeyId` / `secretAccessKey` in the chart values needed.
#
# Loki is cluster-wide observability infra (consumed by every workload,
# not by a single product surface), so per the consumer-owns rule in
# `docs/external-secrets-install.md` it lives in the homelab project —
# same as Grafana's admin password and Minecraft's CurseForge API key.
#
# Expected state on first apply: `SecretSyncedError` until the two GCP
# secrets (`loki-access-key`, `loki-secret-key`) exist. The runbook
# (`docs/loki-install.md`) creates them in Steps 1-2 of the bootstrap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: loki-creds
    namespace: monitoring
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-homelab
    target:
        name: loki-creds
        creationPolicy: Owner
    data:
        - secretKey: AWS_ACCESS_KEY_ID
          remoteRef:
              key: loki-access-key
        - secretKey: AWS_SECRET_ACCESS_KEY
          remoteRef:
              key: loki-secret-key

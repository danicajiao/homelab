apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Loki — repo-managed manifests.
#
# Just the ExternalSecret that materializes the Garage S3 credentials Loki
# needs to talk to the `loki` bucket. The Loki StatefulSet / Service /
# ConfigMaps / PVCs are all installed via the upstream Helm chart, which
# Argo CD pulls directly — see `argocd/loki.yaml` for the chart source and
# pinned version.
#
# The `monitoring` namespace itself is owned by `infra/kube-prometheus-stack/`
# (created when kube-prometheus-stack landed in #214) — we reuse it here.
#
# Garage bootstrap (bucket `loki` + access key `homelab-loki`) lives in
# `docs/loki-install.md` rather than GitOps, same as the other Garage
# buckets — Garage manages buckets/keys via its own CLI inside the pod.
#
# Latest releases: https://github.com/grafana/helm-charts/releases (filter
# for `loki-*`)

namespace: monitoring

resources:
    - external-secret.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cloudflare Tunnel — repo-managed manifests.
#
# Everything needed to run cloudflared in the cluster:
#   - external-secret.yaml: pulls the tunnel credential JSON from GCP SM
#     and materializes it as K8s Secret `tunnel-creds`.
#   - configmap.yaml: cloudflared tunnel config (tunnel ID + ingress rules).
#   - deployment.yaml: cloudflared Deployment (1 replica, mounts both above).
#   - placeholder.yaml: temporary NGINX target for api.coveapp.dev until
#     cove-gateway lands in Phase 1.
#
# The `cloudflare-tunnel` namespace is created by Argo CD via the
# CreateNamespace=true syncOption in `argocd/cloudflare-tunnel.yaml`.
#
# Bootstrap: tunnel + DNS CNAME were created manually before this PR
# (see `docs/cloudflare-tunnel-install.md`). The only ongoing ops task
# is bumping the cloudflared image tag in deployment.yaml on new releases.

namespace: cloudflare-tunnel

resources:
    - external-secret.yaml
    - configmap.yaml
    - deployment.yaml
    - placeholder.yaml

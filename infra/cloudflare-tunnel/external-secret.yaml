# Cloudflare Tunnel credential ExternalSecret.
#
# Pulls the tunnel credential JSON (created during bootstrap via
# `cloudflared tunnel create homelab` — see `docs/cloudflare-tunnel-install.md`)
# from GCP Secret Manager (project `homelab-495921`) via the `gcp-homelab`
# ClusterSecretStore, and materializes it as a single K8s Secret named
# `tunnel-creds` in the `cloudflare-tunnel` namespace.
#
# The Secret exposes the credential under the key `creds.json` so the
# cloudflared Deployment can mount it as a file at
# `/etc/cloudflared/creds/creds.json` — the path the tunnel config
# references via `credentials-file`. cloudflared reads the file directly;
# no env-var injection needed.
#
# Cloudflare Tunnel is cluster-wide ingress infra (not a single product
# surface), so per the consumer-owns rule it lives in the homelab project
# alongside Garage, Grafana, and Minecraft.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: tunnel-creds
    namespace: cloudflare-tunnel
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-homelab
    target:
        name: tunnel-creds
        creationPolicy: Owner
    data:
        - secretKey: creds.json
          remoteRef:
              key: cloudflare-tunnel-creds

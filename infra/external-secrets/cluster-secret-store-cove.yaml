# ClusterSecretStore for the **cove** GCP project (`cove-6a685`).
#
# Backs every ExternalSecret whose remote value is consumed by a cove-side
# workload — e.g. Garage's `cove-images` / `cove-postgres-backups` access keys
# (consumed by cove-image and CNPG `Cluster` resources for cove databases).
# The sibling store `gcp-homelab` (in `cluster-secret-store-homelab.yaml`)
# backs homelab-only workloads such as Minecraft. See
# `docs/external-secrets-install.md` for the per-project setup pattern and the
# "consumer-owns" rule that decides which store a new secret belongs to.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
    name: gcp-cove
spec:
    provider:
        gcpsm:
            projectID: cove-6a685
            # Long-lived service account JSON key, bootstrapped out-of-band into
            # the `external-secrets` namespace as `gcp-sm-credentials` (key
            # `key.json`). See `docs/external-secrets-install.md` for the
            # `gcloud iam service-accounts keys create` + `kubectl create secret`
            # steps.
            #
            # Workload Identity Federation is the long-term direction; revisit
            # once K3s WIF is wired up. Until then, rotate this key periodically
            # (runbook covers the rotation flow).
            auth:
                secretRef:
                    secretAccessKeySecretRef:
                        name: gcp-sm-credentials
                        key: key.json
                        namespace: external-secrets

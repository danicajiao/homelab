# ClusterSecretStore for the **homelab** GCP project (`homelab-495921`).
#
# Backs every ExternalSecret whose remote value is consumed by a homelab-only
# workload — currently Minecraft's CurseForge API key; future Cloudflare
# Tunnel credentials and Grafana admin password land here too. The sibling
# store `gcp-cove` (in `cluster-secret-store-cove.yaml`) backs cove-side
# workloads. See `docs/external-secrets-install.md` for the per-project setup
# pattern and the "consumer-owns" rule that decides which store a new secret
# belongs to.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
    name: gcp-homelab
spec:
    provider:
        gcpsm:
            projectID: homelab-495921
            # Long-lived service account JSON key, bootstrapped out-of-band into
            # the `external-secrets` namespace as `gcp-homelab-credentials` (key
            # `key.json`). See `docs/external-secrets-install.md` for the
            # `gcloud iam service-accounts keys create` + `kubectl create secret`
            # steps.
            #
            # Workload Identity Federation is the long-term direction; revisit
            # once K3s WIF is wired up. Until then, rotate this key periodically
            # (runbook covers the rotation flow).
            auth:
                secretRef:
                    secretAccessKeySecretRef:
                        name: gcp-homelab-credentials
                        key: key.json
                        namespace: external-secrets

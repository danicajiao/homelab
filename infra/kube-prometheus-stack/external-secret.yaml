# Grafana admin credentials ExternalSecret.
#
# Pulls `grafana-admin-password` from GCP Secret Manager (project
# `homelab-495921`) via the `gcp-homelab` ClusterSecretStore and materializes
# it as a K8s Secret named `grafana-admin-creds` in the `monitoring`
# namespace. That Secret name is what `grafana.admin.existingSecret` on the
# kube-prometheus-stack Application points at — see `argocd/kube-prometheus-stack.yaml`.
#
# Grafana is cluster-wide infra (not consumed by a single cove or homelab
# workload), so per the consumer-owns rule in `docs/external-secrets-install.md`
# it lives in the homelab project — same as Cloudflare Tunnel and Minecraft.
#
# The chart's grafana subchart expects two keys in the Secret:
#   - admin-user      → the login username
#   - admin-password  → the login password
# We sync only `admin-password` from GCP SM (it's the actual secret value) and
# template the username inline as `admin`. The username isn't sensitive — it's
# the same hardcoded default the chart ships with — so there's no point
# round-tripping it through GCP SM. This keeps the GCP SM surface minimal
# (one secret per real secret value).
#
# Expected state on first apply: `SecretSyncedError` until the GCP secret
# exists. The runbook (`docs/kube-prometheus-stack-install.md`) creates it as
# Step 1 of the bootstrap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: grafana-admin-creds
    namespace: monitoring
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-homelab
    target:
        name: grafana-admin-creds
        creationPolicy: Owner
        template:
            type: Opaque
            data:
                # Username is not sensitive — template it directly rather than
                # syncing from GCP SM. Matches the chart default `adminUser: admin`.
                admin-user: admin
                # Password is sourced from GCP SM via the `data` block below.
                admin-password: "{{ .password }}"
    data:
        - secretKey: password
          remoteRef:
              key: grafana-admin-password

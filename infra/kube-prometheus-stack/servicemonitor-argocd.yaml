# Argo CD ServiceMonitors.
#
# Argo CD ships four Services that expose Prometheus metrics. We install the
# raw upstream `install.yaml` manifest (see `infra/argocd/kustomization.yaml`)
# which doesn't include ServiceMonitors of its own, so we author them here
# alongside the rest of the kube-prometheus-stack config.
#
# The `release: kube-prometheus-stack` label is what the chart's default
# `serviceMonitorSelector` matches against (chart default
# `serviceMonitorSelectorNilUsesHelmValues: true` resolves to label selector
# `release=<helm-release-name>`). Drop the label and Prometheus silently
# ignores the ServiceMonitor.
#
# Service / port references confirmed against
# https://argo-cd.readthedocs.io/en/stable/operator-manual/metrics/
# at Argo CD v3.4.1 (pinned in `infra/argocd/kustomization.yaml`).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: argocd-metrics
    namespace: monitoring
    labels:
        release: kube-prometheus-stack
spec:
    namespaceSelector:
        matchNames:
            - argocd
    selector:
        matchLabels:
            app.kubernetes.io/name: argocd-metrics
    endpoints:
        - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: argocd-server-metrics
    namespace: monitoring
    labels:
        release: kube-prometheus-stack
spec:
    namespaceSelector:
        matchNames:
            - argocd
    selector:
        matchLabels:
            app.kubernetes.io/name: argocd-server-metrics
    endpoints:
        - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: argocd-repo-server-metrics
    namespace: monitoring
    labels:
        release: kube-prometheus-stack
spec:
    namespaceSelector:
        matchNames:
            - argocd
    selector:
        matchLabels:
            app.kubernetes.io/name: argocd-repo-server
    endpoints:
        - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: argocd-applicationset-controller-metrics
    namespace: monitoring
    labels:
        release: kube-prometheus-stack
spec:
    namespaceSelector:
        matchNames:
            - argocd
    selector:
        matchLabels:
            app.kubernetes.io/name: argocd-applicationset-controller
    endpoints:
        - port: metrics

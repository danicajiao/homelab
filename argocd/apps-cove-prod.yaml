apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cove-prod
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    source:
        repoURL: https://github.com/danicajiao/homelab.git
        targetRevision: main
        path: apps/cove/overlays/prod
    destination:
        server: https://kubernetes.default.svc
        namespace: cove-prod
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: external-secrets
    namespace: argocd
    finalizers:
        - resources-finalizer.argocd.argoproj.io
spec:
    project: default
    # Two-source Application:
    #   1. Upstream ESO Helm chart at a pinned version (operator + CRDs).
    #   2. This repo's `infra/external-secrets/` (namespace, ClusterSecretStore,
    #      smoke-test ExternalSecret).
    #
    # Argo CD renders both sources and applies them as a single Application,
    # which keeps the operator and its custom resources in lockstep on each
    # sync.
    #
    # Bumping the chart: edit `targetRevision` below, verify the rendered
    # output, open a PR. Latest releases:
    # https://github.com/external-secrets/external-secrets/releases
    sources:
        - repoURL: https://charts.external-secrets.io
          chart: external-secrets
          targetRevision: 2.4.1
          helm:
              releaseName: external-secrets
              # The chart installs CRDs by default; leave that on so Argo CD
              # owns them. `installCRDs: true` is the chart default in 2.x but
              # we set it explicitly for clarity.
              parameters:
                  - name: installCRDs
                    value: "true"
        - repoURL: https://github.com/danicajiao/homelab.git
          targetRevision: main
          path: infra/external-secrets
    destination:
        server: https://kubernetes.default.svc
        namespace: external-secrets
    # Mirror argocd-self's caution: auto-heal drift, never auto-prune. Losing
    # an ESO CRD via prune would silently break every ExternalSecret in the
    # cluster. Manual prune is `argocd app sync external-secrets --prune`.
    syncPolicy:
        automated:
            prune: false
            selfHeal: true
        syncOptions:
            - ServerSideApply=true
            - CreateNamespace=true

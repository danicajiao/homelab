# CurseForge API key for the Minecraft server.
#
# Pulls `minecraft-curseforge-api-key` from GCP Secret Manager (project
# `homelab-495921`) via the cluster-scoped `gcp-homelab` ClusterSecretStore
# and materializes it as the K8s Secret `minecraft-secrets` with key
# `CF_API_KEY` — the exact name + key the existing Deployment references via
# `secretKeyRef`. Do not rename either without also updating
# `deployment.yaml`.
#
# Minecraft is a homelab-only workload, so its secret lives in the homelab
# GCP project (not `cove-6a685`). See `docs/external-secrets-install.md` for
# the "consumer-owns" rule.
#
# Bootstrap (one-time, before this lands on the cluster):
#   1. Upload the existing CF API key to GCP SM:
#        echo -n '<key>' | gcloud secrets create minecraft-curseforge-api-key \
#            --project homelab-495921 --data-file=- --replication-policy=automatic
#   2. Delete the manually-created K8s Secret so ESO can take ownership cleanly:
#        kubectl -n gaming delete secret minecraft-secrets
#   3. Merge the PR — ESO recreates the Secret on its next refresh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: minecraft-curseforge-key
    namespace: gaming
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-homelab
    target:
        name: minecraft-secrets
        creationPolicy: Owner
    data:
        - secretKey: CF_API_KEY
          remoteRef:
              key: minecraft-curseforge-api-key

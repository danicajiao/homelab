# ExternalSecret — GAR image pull credentials.
#
# Syncs the gar-pull-reader service account key from GCP Secret Manager
# and materialises it as a kubernetes.io/dockerconfigjson Secret named
# gar-pull-secret. Deployments reference it via imagePullSecrets so the
# K3s node can pull private images from Artifact Registry.
#
# This lives at base level (not inside a service subdirectory) because
# every cove service deployed from GAR needs it.
#
# ONE-TIME BOOTSTRAP — the GCP secret must exist before this syncs:
#
#   gcloud iam service-accounts create gar-pull-reader \
#     --project=cove-6a685 --display-name="GAR Pull Reader (K3s)"
#   gcloud projects add-iam-policy-binding cove-6a685 \
#     --member="serviceAccount:gar-pull-reader@cove-6a685.iam.gserviceaccount.com" \
#     --role="roles/artifactregistry.reader"
#   gcloud iam service-accounts keys create /tmp/gar-pull-key.json \
#     --iam-account=gar-pull-reader@cove-6a685.iam.gserviceaccount.com
#   gcloud secrets create gar-pull-service-account-key \
#     --project=cove-6a685 --replication-policy=automatic
#   gcloud secrets versions add gar-pull-service-account-key \
#     --project=cove-6a685 --data-file=/tmp/gar-pull-key.json
#   rm /tmp/gar-pull-key.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: gar-pull-secret
spec:
    refreshInterval: 24h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-cove
    target:
        name: gar-pull-secret
        creationPolicy: Owner
        template:
            type: kubernetes.io/dockerconfigjson
            data:
                .dockerconfigjson: '{"auths":{"us-central1-docker.pkg.dev":{"username":"_json_key","password":{{ .serviceAccountKey | toJson }},"auth":{{ printf "_json_key:%s" .serviceAccountKey | b64enc | toJson }}}}}'
    data:
        - secretKey: serviceAccountKey
          remoteRef:
              key: gar-pull-service-account-key

# Syncs the Firebase service account JSON from GCP Secret Manager into a
# Kubernetes Secret. The Deployment mounts this Secret at
# /secrets/firebase/ — the file appears at credentials.json, which is
# exactly the path FIREBASE_CREDENTIALS_PATH points at.
#
# ONE-TIME SETUP — run once before this manifest is applied:
#
#   1. In the Firebase console, create a service account under
#      Project Settings → Service Accounts → Generate new private key.
#      Download the JSON file.
#
#   2. Store it in GCP Secret Manager:
#
#        gcloud secrets create cove-api-firebase-service-account \
#          --project=cove-6a685 \
#          --replication-policy=automatic
#
#        gcloud secrets versions add cove-api-firebase-service-account \
#          --project=cove-6a685 \
#          --data-file=/path/to/serviceAccount.json
#
# Until the GCP secret exists, this ExternalSecret will stay in
# SecretSyncedError and the Deployment pod will be stuck in
# ContainerCreating (volume mount blocked). Once the secret is created,
# ESO syncs it automatically within the refreshInterval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: cove-api-firebase-credentials
spec:
    refreshInterval: 1h
    secretStoreRef:
        kind: ClusterSecretStore
        name: gcp-cove
    target:
        name: cove-api-firebase-credentials
        creationPolicy: Owner
    data:
        - secretKey: credentials.json
          remoteRef:
              key: cove-api-firebase-service-account

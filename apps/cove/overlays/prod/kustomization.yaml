apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay — every base resource is rewritten into the cove-prod
# namespace. Env-specific patches (image tags, replica counts, resource
# limits) belong here too as the app grows.

namespace: cove-prod

resources:
    - ../../base

# Prod tag is promoted manually from staging after validation.
# Keep in sync with the staging overlay until a formal promotion workflow
# exists.
images:
    - name: us-central1-docker.pkg.dev/cove-6a685/services/cove-api
      newTag: sha-0413d2b6daabf6c0a1fbadc689ff9ccf6c175173
